<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatMyPDF</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Background grain overlay -->
  <div class="grain"></div>

  <!-- Ambient glow blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="logo">
        <span class="logo-icon">⬡</span>
        <span class="logo-text">ChatMyPDF</span>
      </div>

      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept=".pdf" hidden />
        <div class="upload-inner" id="uploadInner">
          <div class="upload-icon-wrap">
            <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke-linecap="round"/>
              <polyline points="16 6 12 2 8 6" stroke-linecap="round" stroke-linejoin="round"/>
              <line x1="12" y1="2" x2="12" y2="15" stroke-linecap="round"/>
            </svg>
          </div>
          <p class="upload-label">Drop your PDF here</p>
          <p class="upload-sub">or <button class="upload-browse" id="browseBtn">browse file</button></p>
          <p class="upload-hint">PDF files only</p>
        </div>
      </div>

      <!-- Upload progress/status -->
      <div class="upload-status" id="uploadStatus" hidden>
        <div class="file-card" id="fileCard">
          <div class="file-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke-linecap="round" stroke-linejoin="round"/>
              <polyline points="14 2 14 8 20 8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="file-info">
            <span class="file-name" id="fileName">document.pdf</span>
            <span class="file-state" id="fileState">Processing…</span>
          </div>
          <div class="file-badge" id="fileBadge"></div>
        </div>
        <div class="progress-bar-wrap" id="progressWrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <!-- New chat button -->
      <button class="new-chat-btn" id="newChatBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19" stroke-linecap="round"/>
          <line x1="5" y1="12" x2="19" y2="12" stroke-linecap="round"/>
        </svg>
        New Chat
      </button>

      <div class="sidebar-footer">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-label" id="statusLabel">No document loaded</span>
      </div>
    </aside>

    <!-- MAIN CHAT AREA -->
    <main class="chat-area">

      <!-- Empty state -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="4" width="36" height="46" rx="4" stroke="currentColor" stroke-width="2" stroke-dasharray="4 3"/>
            <path d="M44 4l8 8v38a4 4 0 01-4 4H12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M44 4v8h8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="44" cy="44" r="12" fill="var(--accent)" opacity="0.15"/>
            <path d="M44 39v5l3 3" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>
            <circle cx="44" cy="44" r="12" stroke="var(--accent)" stroke-width="1.5"/>
          </svg>
        </div>
        <h2 class="empty-title">Upload a PDF to begin</h2>
        <p class="empty-desc">Once uploaded, ask anything about your document — summaries, key insights, specific details.</p>
        <div class="example-queries">
          <span class="eq-label">Try asking</span>
          <div class="eq-chips" id="exampleChips">
            <button class="eq-chip" data-q="Summarize this document in 3 bullet points">Summarize this document</button>
            <button class="eq-chip" data-q="What are the key findings or conclusions?">Key findings</button>
            <button class="eq-chip" data-q="What is this document about?">What is this about?</button>
            <button class="eq-chip" data-q="List the main topics covered in this document">Main topics</button>
          </div>
        </div>
      </div>

      <!-- Messages container -->
      <div class="messages" id="messages" hidden></div>

      <!-- Input bar -->
      <div class="input-bar">
        <div class="input-wrap">
          <textarea
            id="queryInput"
            class="query-input"
            placeholder="Ask anything about your PDF…"
            rows="1"
            disabled
          ></textarea>
          <button class="send-btn" id="sendBtn" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
        <p class="input-hint">Powered by your document · Answers may vary</p>
      </div>

    </main>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script src="main.js"></script>
</body>
</html>
